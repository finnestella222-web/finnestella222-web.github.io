<!DOCTYPE html>
<html>
<head>
  <title>Finn's Shit</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: white;
      min-height: 100vh;
    }

    #page {
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    nav {
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .nav-name {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
    }

    nav .nav-links {
      display: flex;
      gap: 24px;
    }

    nav .nav-links a {
      color: #666;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav .nav-links a:hover { color: white; }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 40px 100px;
    }

    .page-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 60px;
    }

    h2 {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-top: 52px;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1a1a1a;
    }

    /* PHOTO TILES */
    .links-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .link-tile {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 6px;
      overflow: hidden;
      text-decoration: none;
      border: 1px solid #1a1a1a;
      transition: transform 0.15s, border-color 0.2s;
    }

    .link-tile:hover {
      transform: translateY(-3px);
      border-color: #444;
    }

    .link-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(30%);
    }

    .link-tile .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      padding: 16px 12px 12px;
    }

    .link-tile .overlay .link-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
    }

    .link-tile .overlay .link-name {
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    /* BLOG CARDS */
    .blog-card {
      border-left: 1px solid #2a2a2a;
      padding: 0 0 32px 24px;
      margin-bottom: 8px;
    }

    .blog-card .subject {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .blog-card h3 {
      font-size: 18px;
      color: white;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .blog-card .thought {
      font-size: 14px;
      color: #777;
      line-height: 1.7;
      font-style: italic;
    }

    .blog-card .meta {
      font-size: 11px;
      color: #333;
      margin-top: 10px;
      letter-spacing: 0.06em;
    }

    footer {
      padding: 20px 40px;
      font-size: 12px;
      color: #333;
      letter-spacing: 0.08em;
      max-width: 860px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<div id="page">

  <nav>
    <a class="nav-name" href="index.html">Finn Estella</a>
    <div class="nav-links">
      <a href="resume.html">Resume</a>
      <a href="projects.html">Projects</a>
      <a href="flows.html">Flows</a>
      <a href="recs.html">Recs</a>
    </div>
  </nav>

  <div class="container">

    <p class="page-title">¯_(ツ)_/¯ Finn's Shit</p>

    <h2>Links</h2>
    <div class="links-grid">

      <a class="link-tile" href="https://www.instagram.com/finnestella22" target="_blank">
        <img src="img-main.png" alt="Main Instagram">
        <div class="overlay">
          <div class="link-label">Main</div>
          <div class="link-name">@finnestella22</div>
        </div>
      </a>

      <a class="link-tile" href="https://www.instagram.com/sideline.finn" target="_blank">
        <img src="img-lax.png" alt="Lax Clips">
        <div class="overlay">
          <div class="link-label">Lax Clips</div>
          <div class="link-name">@sideline.finn</div>
        </div>
      </a>

      <a class="link-tile" href="https://www.depop.com/finnestella/" target="_blank">
        <img src="img-depop.png" alt="Depop">
        <div class="overlay">
          <div class="link-label">Depop</div>
          <div class="link-name">Buy Cool (My) Clothes</div>
        </div>
      </a>

    </div>

    <h2>Recs</h2>

    <div class="blog-card">
      <div class="subject">Currently Reading</div>
      <h3>A Farewell to Arms</h3>
      <p class="thought">"it was cool idk ! :)"</p>
      <div class="meta">March 2026</div>
    </div>

  </div>

  <footer>Made by Finn</footer>
</div>
</body>
</html>
