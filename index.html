<!DOCTYPE html>
<html>
<head>
  <title>Finn's Website</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #0b1c2c;
      color: white;
      text-align: center;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #ascii-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #ascii-bg pre {
      color: rgba(79, 195, 247, 0.08);
      font-family: monospace;
      white-space: pre;
      user-select: none;
      line-height: 1.15;
      font-size: 1.6vw;
      letter-spacing: 0.05em;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      transform-origin: top left;
    }

    nav, header, .container, footer {
      position: relative;
      z-index: 1;
    }

    nav {
      background-color: rgba(13, 42, 66, 0.92);
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: #4fc3f7;
      text-decoration: none;
      margin: 0 20px;
      font-size: 16px;
    }

    nav a:hover {
      color: #81d4fa;
    }

    header {
      background-color: rgba(18, 58, 92, 0.88);
      padding: 40px 30px 0;
    }

    header h1 {
      font-size: 40px;
      margin-bottom: 8px;
    }

    header p.tagline {
      color: #cfd8dc;
      margin-bottom: 4px;
    }

    header p.linkedin {
      font-size: 14px;
      margin-bottom: 20px;
    }

    header p.linkedin a {
      color: #4fc3f7;
      text-decoration: none;
    }

    header p.linkedin a:hover {
      color: #81d4fa;
    }

    .wave-container {
      line-height: 0;
    }

    .wave-container svg {
      display: block;
      width: 100%;
    }

    .container {
      padding: 50px 40px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #cfd8dc;
    }

    a.nav-link {
      display: block;
      margin: 15px auto;
      max-width: 300px;
      background-color: rgba(18, 58, 92, 0.9);
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      padding: 14px 20px;
      color: #4fc3f7;
      text-decoration: none;
      font-size: 20px;
      transition: background-color 0.2s, color 0.2s;
    }

    a.nav-link:hover {
      background-color: #1a4a73;
      color: #81d4fa;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      background-color: rgba(18, 58, 92, 0.92);
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
