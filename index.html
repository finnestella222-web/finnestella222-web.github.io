<!DOCTYPE html>
<html>
<head>
  <title>Finn's Website</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #0b1c2c;
      color: white;
      text-align: center;
    }

    nav {
      background-color: #0d2a42;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: #4fc3f7;
      text-decoration: none;
      margin: 0 20px;
      font-size: 16px;
    }

    nav a:hover {
      color: #81d4fa;
    }

    header {
      background-color: #123a5c;
      padding: 40px 30px 0;
    }

    header h1 {
      font-size: 40px;
      margin-bottom: 8px;
    }

    header p.tagline {
      color: #cfd8dc;
      margin-bottom: 4px;
    }

    header p.linkedin {
      font-size: 14px;
      margin-bottom: 20px;
    }

    header p.linkedin a {
      color: #4fc3f7;
      text-decoration: none;
    }

    header p.linkedin a:hover {
      color: #81d4fa;
    }

    .wave-container {
      line-height: 0;
    }

    .wave-container svg {
      display: block;
      width: 100%;
    }

    .container {
      padding: 50px 40px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #cfd8dc;
    }

    a.nav-link {
      display: block;
      margin: 15px auto;
      max-width: 300px;
      background-color: #123a5c;
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      padding: 14px 20px;
      color: #4fc3f7;
      text-decoration: none;
      font-size: 20px;
      transition: background-color 0.2s, color 0.2s;
    }

    a.nav-link:hover {
      background-color: #1a4a73;
      color: #81d4fa;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      background-color: #123a5c;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">🏠 Home</a>
    <a href="resume.html">📄 Resume</a>
    <a href="projects.html">💻 Projects</a>
    <a href="flows.html">🌊 Flows</a>
  </nav>

  <header>
    <h1>🌊 Finn's Website</h1>
    <p class="tagline">Welcome to my corner of the internet</p>
    <p class="linkedin"><a href="https://www.linkedin.com/in/finnestella" target="_blank">www.linkedin.com/in/finnestella</a></p>
    <div class="wave-container">
      <svg viewBox="0 0 1200 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="80">
        <path d="M0,40 C150,80 350,0 600,40 C850,80 1050,0 1200,40 L1200,80 L0,80 Z" fill="#0b1c2c"/>
      </svg>
    </div>
  </header>

  <div class="container">
    <h2>Links</h2>
    <a class="nav-link" href="resume.html">📄 My Resume</a>
    <a class="nav-link" href="projects.html">💻 My Projects</a>
    <a class="nav-link" href="flows.html">🌊 Little Flows</a>

  <footer>
    <p>Made by Finn</p>
  </footer>

</body>
