<!DOCTYPE html>
<html>
<head>
  <title>Finn's Website</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #0b1c2c;
      color: white;
      text-align: center;
    }

    header {
      background-color: #123a5c;
      padding: 40px 30px 0;
      position: relative;
      overflow: hidden;
    }

    header h1 {
      font-size: 40px;
      margin-bottom: 8px;
    }

    header p.tagline {
      color: #cfd8dc;
      margin-bottom: 4px;
    }

    header p.linkedin {
      font-size: 14px;
      margin-bottom: 20px;
    }

    header p.linkedin a {
      color: #4fc3f7;
      text-decoration: none;
    }

    header p.linkedin a:hover {
      color: #81d4fa;
    }

    .wave-container {
      line-height: 0;
    }

    .wave-container svg {
      display: block;
      width: 100%;
    }

    .container {
      padding: 50px 40px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #cfd8dc;
    }

    a.nav-link {
      display: block;
      margin: 15px auto;
      max-width: 300px;
      background-color: #123a5c;
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      padding: 14px 20px;
      color: #4fc3f7;
      text-decoration: none;
      font-size: 20px;
      transition: background-color 0.2s, color 0.2s;
    }

    a.nav-link:hover {
      background-color: #1a4a73;
      color: #81d4fa;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      background-color: #123a5c;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
