<!DOCTYPE html>

<head>
  <title>Finn Estella</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #0a0a0a;
      color: white;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #ascii-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      animation: bgFade 3s ease forwards;
      animation-delay: 0.5s;
    }

    @keyframes bgFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #page {
      position: relative;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    nav {
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .nav-name {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    nav .nav-links {
      display: flex;
      gap: 24px;
    }

    nav .nav-links a {
      color: #666;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav .nav-links a:hover { color: white; }

    #hero {
      padding: 12vh 40px 0;
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 700;
      line-height: 1.25;
      color: white;
      max-width: 800px;
    }

    #hero h1 span.dim { color: #555; }

    #hero p.linkedin {
      margin-top: 32px;
      font-size: 13px;
      color: #555;
      letter-spacing: 0.05em;
    }

    #hero p.linkedin a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }

    #hero p.linkedin a:hover { color: white; }

    .container {
      padding: 80px 40px 60px;
    }

    .links-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a.nav-link {
      display: inline-block;
      padding: 10px 22px;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #777;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
      background-color: transparent;
    }

    a.nav-link:hover {
      border-color: #666;
      color: white;
    }

    footer {
      padding: 20px 40px;
      font-size: 12px;
      color: #333;
      letter-spacing: 0.08em;
    }
  </style>

    const canvas = document.getElementById('ascii-canvas');
    const ctx = canvas.getContext('2d');

    const FONT_SIZE = 7;
    const FONT = `${FONT_SIZE}px monospace`;
    const REPULSION_RADIUS = 20;
    const REPULSION_STRENGTH = 15;
    const RETURN_SPEED = 0.3;
    const COLOR = 'rgba(255,255,255,0.045)';

    let mouse = { x: -9999, y: -9999 };
    let chars = [];
    let cols, rows;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      buildGrid();
    }

    function buildGrid() {
      ctx.font = FONT;
      const charW = FONT_SIZE * 0.6;
      const charH = FONT_SIZE * 1.1;

      cols = Math.ceil(canvas.width / charW);
      rows = Math.ceil(canvas.height / charH);

      const lines = ascii.split('\n');
      chars = [];

      for (let row = 0; row < rows; row++) {
        const line = lines[row % lines.length] || '';
        for (let col = 0; col < cols; col++) {
          const ch = line[col % line.length] || ' ';
          const ox = col * charW;
          const oy = row * charH + FONT_SIZE;
          chars.push({
            ch,
            ox, oy,       // origin
            x: ox, y: oy, // current
            vx: 0, vy: 0
          });
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = FONT;
      ctx.fillStyle = COLOR;

      for (const c of chars) {
        const dx = c.x - mouse.x;
        const dy = c.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < REPULSION_RADIUS && dist > 0) {
          const force = (REPULSION_RADIUS - dist) / REPULSION_RADIUS;
          c.vx += (dx / dist) * force * REPULSION_STRENGTH * 0.4;
          c.vy += (dy / dist) * force * REPULSION_STRENGTH * 0.4;
        }

        // spring back to origin
        c.vx += (c.ox - c.x) * RETURN_SPEED;
        c.vy += (c.oy - c.y) * RETURN_SPEED;

        // damping
        c.vx *= 0.65;
        c.vy *= 0.65;

        c.x += c.vx;
        c.y += c.vy;

        ctx.fillText(c.ch, c.x, c.y);
      }

      requestAnimationFrame(draw);
    }

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    document.addEventListener('mouseleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
